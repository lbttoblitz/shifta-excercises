version: '3.8'

networks:
  poc-network:
    driver: bridge

services:
  sql-ventas:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-ventas
    environment:
      SA_PASSWORD: "P@ssw0rd123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    networks:
      - poc-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "P@ssw0rd123!", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  sql-preventa:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-preventa
    environment:
      SA_PASSWORD: "P@ssw0rd123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1434:1433"
    networks:
      - poc-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "P@ssw0rd123!", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  sql-pagos:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-pagos
    environment:
      SA_PASSWORD: "P@ssw0rd123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1435:1433"
    networks:
      - poc-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "P@ssw0rd123!", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
